  carc_codes:
    name: X12 Claim Adjustment Reason Codes (denial-category LABELS only)
    url: https://x12.org/codes/claim-adjustment-reason-codes
    provider: x12.org
    classification: REFERENCE
    license_note: >-
      Used as denial-category taxonomy LABELS only (CLAUDE.md §3.7). The X12
      CARC list is not freely bulk-downloadable and its description text is
      copyrighted; we therefore record NO file and reproduce NO X12 description
      text. rcm.ref_carc holds the public CARC code identifiers used by the
      simulation (config/simulation.yaml denial_categories) paired with
      PROJECT-AUTHORED short labels. Codes: 16, 18, 22, 27, 29, 50, 96, 97, 181, 197.
    vintage: "labels-only"  # no dated file; CARC identifiers are stable long-standing X12 codes
    artifacts: {}  # intentionally no download (§3.7 — labels seeded in src/ingestion/reference_codes.py)

