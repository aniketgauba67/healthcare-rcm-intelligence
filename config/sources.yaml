        url: https://www.cms.gov/files/zip/2023-icd-10-pcs-codes-file.zip
        member: icd10pcs_codes_2023.txt  # 7-char code + space + long description
        filename: data/raw/reference/icd10pcs_2023.zip
        vintage: "FY2023"
        sha256: e35b6e2e170ea1ef96e641b891a3e1fb3e47298eafeff6813cbb7b561947c93e
